version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: antiplag
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  file-storage:
    build:
      context: ./services/file-storage
    environment:
      PORT: 8081
      DATA_DIR: /data/files
    volumes:
      - files-data:/data/files
    ports:
      - "8081:8081"
    depends_on:
      - postgres

  file-analysis:
    build:
      context: ./services/file-analysis
    environment:
      PORT: 8082
      POSTGRES_DSN: "host=postgres user=postgres password=postgres dbname=antiplag sslmode=disable"
      FILE_STORAGE_URL: "http://file-storage:8081"
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      file-storage:
        condition: service_started

  api-gateway:
    build:
      context: ./services/api-gateway
    environment:
      PORT: 8080
      FILE_STORAGE_URL: "http://file-storage:8081"
      ANALYSIS_URL: "http://file-analysis:8082"
    ports:
      - "8080:8080"
    depends_on:
      file-analysis:
        condition: service_started

volumes:
  files-data:


